<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Disaster Relief System</title>
    <link rel="stylesheet" href="../../static/stylesheet/style.css" />
</head>
<body>

<div class="auth-page">
    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <div class="logo-icon">🚨</div>
            <h1>Smart Disaster Relief System</h1>
            <p>Emergency Management &amp; Relief Operations</p>
        </div>

        <!-- Body -->
        <div class="auth-body">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to access the dashboard</p>

            <!-- Alert (shown on error) -->
            <div class="alert alert-danger" id="errorAlert" style="display:none;">
                <span>⚠</span>
                <span id="errorMsg">Invalid email or password.</span>
            </div>

            <!-- Form submission triggers partner's exact original function -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <!-- Clean Email Approach -->
                    <label class="form-label" for="email">Email Address <span class="required">*</span></label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="Enter your registered email"
                        autocomplete="email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password <span class="required">*</span></label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    />
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
                    <label style="display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; color:var(--text-muted);">
                        <input type="checkbox" id="remember" style="cursor:pointer;" />
                        Remember me
                    </label>
                    <a href="#" style="font-size:13px; color:var(--primary);">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer-link">
                Don't have an account? <a href="/signup">Create Account</a>
            </div>

            <hr class="divider" />
            <p style="text-align:center; font-size:11px; color:var(--text-light);">
                Demo: email <strong>admin@gmail.com</strong> / password <strong>admin123</strong>
            </p>
        </div>
    </div>
</div>

<script src="../../static/javascript/auth.js"></script>

</body>
</html>
