<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - Smart Disaster Relief System</title>
    <link rel="stylesheet" href="../../static/stylesheet/style.css" />
</head>
<body>

<div class="auth-page">
    <div class="auth-card" style="max-width:480px;">

        <div class="auth-header">
            <div class="logo-icon">🚨</div>
            <h1>Smart Disaster Relief System</h1>
            <p>Emergency Management &amp; Relief Operations</p>
        </div>

        <div class="auth-body">
            <h2>Create Account</h2>
            <p class="subtitle">Register to access the management portal</p>

            <div class="alert alert-success" id="successAlert" style="display:none;">
                <span>✓</span>
                <span>Account created successfully! Redirecting to login...</span>
            </div>

            <div class="alert alert-danger" id="errorAlert" style="display:none;">
                <span>⚠</span>
                <span id="errorMsg">Please fill all required fields.</span>
            </div>

            <form id="signupForm" onsubmit="handleSignup(event)">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" class="form-control" id="firstName" placeholder="First name" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" class="form-control" id="lastName" placeholder="Last name" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address <span class="required">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="your@email.com" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Role <span class="required">*</span></label>
                    <select class="form-control" id="role" required>
                        <option value="">-- Select Role --</option>
                        <option value="admin">Administrator</option>
                        <option value="coordinator">Relief Coordinator</option>
                        <option value="volunteer_mgr">Volunteer Manager</option>
                        <option value="field_officer">Field Officer</option>
                        <option value="data_entry">Data Entry Operator</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="newPassword">Password <span class="required">*</span></label>
                        <input type="password" class="form-control" id="newPassword" placeholder="Min 6 characters" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirm Password <span class="required">*</span></label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
                    </div>
                </div>

                <div style="margin-bottom:18px;">
                    <label style="display:flex; align-items:flex-start; gap:8px; font-size:13px; cursor:pointer; color:var(--text-muted);">
                        <input type="checkbox" id="agree" style="margin-top:2px; cursor:pointer;" required />
                        I agree to the <a href="#" style="color:var(--primary);">Terms of Use</a> and understand that this system is for authorized personnel only.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer-link">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
    </div>
</div>

<script src="../../static/javascript/auth.js"></script>
</body>
</html>
